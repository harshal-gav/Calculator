name: LinkedIn Auto-Post Cron

on:
  schedule:
    # Runs every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub UI

jobs:
  ping-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger LinkedIn Post API
        run: |
          curl -X GET "${{ secrets.CRON_URL }}?secret=${{ secrets.CRON_SECRET }}"
